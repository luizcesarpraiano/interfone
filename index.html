<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interfone Virtual do Luiz</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; color: #333; }
        .container { max-width: 400px; margin: 0 auto; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        button { padding: 25px 40px; font-size: 22px; color: white; background-color: #0088cc; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.2); width: 100%; transition: 0.2s; }
        button:active { background-color: #006699; transform: scale(0.98); }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        h2 { margin-bottom: 5px; }
        p { color: #666; margin-bottom: 30px; }
        .status { margin-top: 20px; font-weight: bold; color: green; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔔 Interfone Virtual</h2>
        <p>Toque no botão abaixo para iniciar uma chamada de voz com o morador.</p>
        
        <button id="btnChamada" onclick="chamarMorador()">📞 INICIAR CHAMADA</button>
        <div id="statusMsg" class="status">Ligando... Redirecionando para a chamada de voz.</div>
    </div>

    <script>
        function chamarMorador() {
            // Desabilita o botão para evitar cliques duplos
            document.getElementById("btnChamada").disabled = true;
            document.getElementById("statusMsg").style.display = "block";

            // Gera ID único baseado no timestamp atual
            const idSala = "InterfoneLuiz_" + Math.floor(Date.now() / 1000);
            
            // Configurações Jitsi: ignora app móvel, pula telas de validação e desativa o Lobby
            const parametrosAutomacao = "#config.disableDeepLinking=true&config.prejoinPageEnabled=false&config.lobby.enabled=false&config.startWithAudioMuted=false&config.startWithVideoMuted=true";
            const linkChamada = "https://jit.si" + idSala + parametrosAutomacao;

            // Credenciais do bot do Telegram
            const botToken = "8723452437:AAG5_xS9BSiwrgFo0E9ymKS_uzggmQLN18U";
            const chatId = "730395774";
            const textoMensagem = "🔔 ENTRADA: Tem alguém tocando o interfone!\n\n👉 Clique no link abaixo para atender por VOZ:\n" + linkChamada;
            
            const urlTelegram = "https://telegram.org" + botToken + "/sendMessage?chat_id=" + chatId + "&text=" + encodeURIComponent(textoMensagem);

            // Envia o alerta para o Telegram de forma silenciosa
            fetch(urlTelegram, { mode: 'no-cors' }).catch(err => console.log("Erro Telegram:", err));

            // URL corrigida do ThingSpeak com endpoint correto da API
            const writeApiKey = "WOOA8Y83BBJ3A6L0"; 
            const urlThingSpeak = "https://thingspeak.com" + writeApiKey + "&field1=1";

            // Envia o comando para o ThingSpeak sem ler a resposta (evita travas de CORS)
            fetch(urlThingSpeak, { mode: 'no-cors' });

            // Redireciona o visitante direto para a chamada de forma limpa e independente após 2 segundos
            setTimeout(() => {
                window.location.href = linkChamada;
            }, 2000);
        }
    </script>
</body>
</html>
