<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interfone Virtual</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; color: #333; }
        .container { max-width: 400px; margin: 0 auto; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        button { padding: 25px 40px; font-size: 22px; color: white; background-color: #0088cc; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.2); width: 100%; transition: 0.2s; }
        button:active { background-color: #006699; transform: scale(0.98); }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        h2 { margin-bottom: 5px; }
        p { color: #666; margin-bottom: 30px; }
        .status { margin-top: 20px; font-weight: bold; color: green; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔔 Interfone Virtual luiz </h2>
        <p>Toque para iniciar uma chamada de voz.</p>
        
        <button onclick="chamarMorador(this)">📞 INICIAR CHAMADA</button>
        <div id="statusMsg" class="status">Ligando... Abrindo chamada de voz.</div>
    </div>

    <script>
        function chamarMorador(botao) {
            if (botao) botao.disabled = true;
            
            const msg = document.getElementById("statusMsg");
            if (msg) msg.style.display = "block";

            const timestamp = Math.floor(Date.now() / 1000);
            
            // 1. URL DO JITSI CORRIGIDA (com meet.jit.si e barra /)
            const linkChamada = "https://meet.jit.si/interfone_" + timestamp + "#config.disableDeepLinking=true&config.prejoinPageEnabled=false&config.lobby.enabled=false&config.startWithAudioMuted=false&config.startWithVideoMuted=true";

            // 2. URL DO TELEGRAM CORRIGIDA (com api.telegram.org/bot...)
            const botToken = "8723452437:AAG5_xS9BSiwrgFo0E9ymKS_uzggmQLN18U";
            const chatId = "730395774";
            const textoMensagem = "🔔 ENTRADA: Tem alguém tocando o interfone!\n\n👉 Clique no link abaixo para atender por VOZ:\n" + linkChamada;
            const urlTelegram = "https://api.telegram.org/bot" + botToken + "/sendMessage?chat_id=" + chatId + "&text=" + encodeURIComponent(textoMensagem);

            fetch(urlTelegram, { mode: 'no-cors' }).catch(err => console.log("Erro Telegram:", err));

            // 3. URL DO THINGSPEAK CORRIGIDA (com api. e /update?api_key=)
            const writeApiKey = "WOOA8Y83BBJ3A6L0"; 
            const urlThingSpeak = "https://thingspeak.com" + writeApiKey + "&field1=1";

            fetch(urlThingSpeak, { mode: 'no-cors' }).catch(err => console.log("Erro IoT:", err));

            // 4. REDIRECIONAMENTO CORRIGIDO
            window.location.href = linkChamada;
        }
    </script>
</body>
</html>
